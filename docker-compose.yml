version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: email_agent_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_KEYCLOAK_URL=${KEYCLOAK_SERVER_URL}
        - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM}
        - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
    container_name: email_agent_frontend
    ports:
      - "8080:80"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default:
    name: plannam_net
    external: true
