server {
    listen 80;
    server_name localhost;

    # Serve the React app
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For React Router to work correctly on full page reload
        try_files $uri $uri/ /index.html;
    }

    # Silent SSO check - must be served as a real file, not redirected to index.html
    location = /silent-check-sso.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store";
    }

    # Proxy requests to /api to the backend container
    location /api/ {
        # 'backend' is the service name from docker-compose.yml
        proxy_pass http://email-agent-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
